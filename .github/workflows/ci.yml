name: API CI

# Lints, type-checks, and builds the Lambda bundle. Runs on every push and PR.
# No AWS calls — the bundle is built locally to confirm the source compiles
# end-to-end the same way `API/create.sh` does.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-build:
    name: lint + typecheck + bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

      # Same esbuild command the deploy script runs. Catches packaging-only
      # failures (missing peer deps, broken imports, etc.) before they hit
      # AWS.
      - name: Build Lambda bundle
        run: npm run bundle:lambda

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-bundle
          path: .lambda-build/index.js
          if-no-files-found: error
          retention-days: 7
